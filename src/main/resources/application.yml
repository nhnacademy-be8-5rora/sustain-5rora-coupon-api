server:
  shutdown: graceful

spring:
  application:
    name: coupon-api
  profiles:
    active: prod # 프로파일 활성화
  lifecycle:
    timeout-per-shutdown-phase: 30s

  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true
        auto_quote_keyword: true
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true  # ??? ?? ???? ??????. ?? JPA ???? ?????? ??? ?? ?? ?????? ?, ?????? ??? ???? ??? ?????.

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true

    service-url:
      defaultZone: http://admin:1234@localhost:8761/eureka

  instance:
    prefer-ip-address: true

management:
  health:
    status:
      order: DOWN, UP
  endpoint:
    jolokia:
      enabled: true
    metrics:
      enabled: true
    pause:
      enabled: true
    resume:
      enabled: true
    restart:
      enabled: true
    shutdown:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

  logging:
    level:
      root: debug
      org.hibernate.orm.jdbc.bind: trace
      org.springframework.transaction.interceptor: trace

      sun.rmi: WARN
      javax.management: WARN

  ## key manager
  key:
    manager:
      url: https://api-keymanager.nhncloudservice.com
      path: /keymanager/v1.0/appkey/{app-key}/secrets/{key-id}
      app-key: qTQNj7LyHhdAazH3
      password: 5555